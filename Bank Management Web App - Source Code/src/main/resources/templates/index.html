<!DOCTYPE html>
<html>
<head>
    <title>Smart Bank - Modern Banking System</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .hero-section {
            text-align: center;
            color: white;
            animation: fadeIn 0.8s ease-in;
        }
        .hero-section h1 {
            font-size: 4rem;
            font-weight: 700;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        .hero-section p {
            font-size: 1.3rem;
            margin-bottom: 40px;
            opacity: 0.95;
        }
        .btn-custom {
            padding: 15px 50px;
            font-size: 1.1rem;
            font-weight: 600;
            border-radius: 50px;
            border: none;
            background: white;
            color: #667eea;
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        .btn-custom:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(0,0,0,0.3);
            color: #764ba2;
        }
        .features {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 60px;
            max-width: 900px;
            margin-left: auto;
            margin-right: auto;
        }
        .feature-box {
            background: rgba(255,255,255,0.1);
            padding: 25px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.2);
        }
        .feature-box i {
            font-size: 2rem;
            margin-bottom: 15px;
            color: #ffd700;
        }
        .feature-box h5 {
            color: white;
            font-weight: 600;
        }
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>
<div class="hero-section">
    <h1><i class="fas fa-university"></i> SmartBank</h1>
    <p>Modern Banking at Your Fingertips</p>
    <a href="/dashboard">
        <button class="btn-custom">Access Dashboard</button>
    </a>

    <div class="features">
        <div class="feature-box">
            <i class="fas fa-user-tie"></i>
            <h5>Manage Customers</h5>
            <p style="font-size: 0.9rem; opacity: 0.9;">Create and manage customer profiles</p>
        </div>
        <div class="feature-box">
            <i class="fas fa-wallet"></i>
            <h5>Multiple Accounts</h5>
            <p style="font-size: 0.9rem; opacity: 0.9;">Checking & Savings accounts</p>
        </div>
        <div class="feature-box">
            <i class="fas fa-exchange-alt"></i>
            <h5>Money Transfer</h5>
            <p style="font-size: 0.9rem; opacity: 0.9;">Quick and secure transfers</p>
        </div>
        <div class="feature-box">
            <i class="fas fa-history"></i>
            <h5>Transaction History</h5>
            <p style="font-size: 0.9rem; opacity: 0.9;">Complete transaction tracking</p>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
