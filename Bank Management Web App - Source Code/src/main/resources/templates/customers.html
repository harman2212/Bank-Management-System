<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>All Customers - Smart Bank</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            font-family: 'Segoe UI', 'Noto Color Emoji', Tahoma, Geneva, Verdana, sans-serif;
            transition: background 0.3s ease;
        }
        body.dark-mode {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
        }
        .navbar-custom {
            background: rgba(0,0,0,0.1);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .navbar-brand {
            font-size: 1.5rem;
            font-weight: 700;
            color: white !important;
        }
        .container-fluid {
            max-width: 1200px;
            margin: 0 auto;
        }
        .customer-card {
            background: rgba(255,255,255,0.95);
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            transition: transform 0.3s ease;
        }
        .customer-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0,0,0,0.15);
        }
        .customer-name {
            font-size: 1.3rem;
            font-weight: 700;
            color: #667eea;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .customer-info {
            margin-bottom: 10px;
            color: #555;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .btn-view {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 25px;
            padding: 8px 20px;
            color: white;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-top: 15px;
        }
        .btn-view:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
            color: white;
            text-decoration: none;
        }
        .back-btn {
            color: white;
            text-decoration: none;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 20px;
        }
        .back-btn:hover { color: #f0f0f0; }
        .section-title {
            color: white;
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 30px;
            text-align: center;
        }
        .empty-state {
            text-align: center;
            color: white;
            margin-top: 50px;
        }
        .empty-state i {
            font-size: 4rem;
            opacity: 0.7;
            margin-bottom: 20px;
        }
        .dark-mode .customer-card {
            background: rgba(42, 42, 64, 0.95);
            color: white;
        }
        .dark-mode .customer-info {
            color: #cccccc;
        }
    </style>
</head>
<body>

<!-- Navigation -->
<nav class="navbar navbar-expand-lg navbar-custom">
    <div class="container-fluid">
        <a class="navbar-brand" href="/"><i class="fas fa-university"></i> SmartBank</a>
        <span class="navbar-text text-white">All Customers</span>
        <div style="margin-left: auto; display: flex; align-items: center;">
            <div id="currentTime" class="text-white me-3" style="font-size: 0.9rem; font-weight: 500;"></div>
            <button class="btn btn-sm" style="background: rgba(255,255,255,0.2); border: 1px solid white; color: white; border-radius: 20px; padding: 8px 15px;" onclick="toggleDarkMode()">
                <i class="fas fa-moon"></i> Dark Mode
            </button>
        </div>
    </div>
</nav>

<div class="container-fluid">
    <a href="/dashboard" class="back-btn"><i class="fas fa-arrow-left"></i> Back to Dashboard</a>

    <h1 class="section-title"><i class="fas fa-users"></i> All Customers</h1>

    <div th:if="${customers.size() > 0}">
        <div class="row">
            <div class="col-12" th:each="customer : ${customers}">
                <div class="customer-card">
                    <div class="customer-name">
                        <i class="fas fa-user-circle"></i> <span th:text="${customer.name}">Customer Name</span>
                    </div>
                    <div class="customer-info">
                        <i class="fas fa-envelope"></i><span th:text="${customer.email}">email@example.com</span>
                    </div>
                    <div class="customer-info">
                        <i class="fas fa-phone"></i><span th:text="${customer.phone}">+1-XXX-XXXX-XXXX</span>
                    </div>
                    <div class="customer-info">
                        <i class="fas fa-wallet"></i><strong>Accounts:</strong> <span th:text="${customer.accounts.size()}">0</span>
                    </div>
                    <div class="customer-info">
                        <i class="fas fa-dollar-sign"></i><strong>Total Balance:</strong> $<span th:text="${#numbers.formatDecimal(customer.totalBalance, 1, 2)}">0.00</span>
                    </div>
                    <a th:href="'/customer/' + ${customer.id}" class="btn-view">
                        <i class="fas fa-arrow-right"></i> View Details
                    </a>
                </div>
            </div>
        </div>
    </div>

    <div class="empty-state" th:unless="${customers.size() > 0}">
        <i class="fas fa-inbox"></i>
        <h4>No Customers Yet</h4>
        <p>Add customers from the dashboard to get started!</p>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    // Dark Mode
    function toggleDarkMode() {
        document.body.classList.toggle('dark-mode');
        localStorage.setItem('darkMode', document.body.classList.contains('dark-mode'));
    }
    if (localStorage.getItem('darkMode') === 'true') {
        document.body.classList.add('dark-mode');
    }

    // Update time every second
    function updateTime() {
        const now = new Date();
        const timeString = now.toLocaleTimeString('en-US', { 
            hour: '2-digit', 
            minute: '2-digit', 
            second: '2-digit',
            hour12: true 
        });
        const dayString = now.toLocaleDateString('en-US', { 
            weekday: 'long', 
            year: 'numeric', 
            month: 'long', 
            day: 'numeric' 
        });
        document.getElementById('currentTime').textContent = timeString + ' | ' + dayString;
    }
    updateTime();
    setInterval(updateTime, 1000);
</script>

</body>
</html>
